name: Run News Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'  # 7am ET daily (noon UTC)

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper openpyxl lxml

      - name: Run scraper
        run: |
          python news_scraper.py \
            --sheet "${{ secrets.SHEET_URL }}" \
            --today \
            --export-json data/articles.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Update articles.json $(date -u +%Y-%m-%d)"
          git push
